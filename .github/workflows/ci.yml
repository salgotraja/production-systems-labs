# CI -- build, unit tests, and golden CSV regression tests.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gradlew: ./gradlew
            artifact-suffix: ubuntu
          - os: macos-latest
            gradlew: ./gradlew
            artifact-suffix: macos
          - os: windows-latest
            gradlew: .\gradlew.bat
            artifact-suffix: windows
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Java version
        run: java -version
      - name: Build and test
        run: ${{ matrix.gradlew }} build --no-daemon
      - name: Generate latency-lab reports
        run: |
          ${{ matrix.gradlew }} :latency-lab:runTailLatency --no-daemon -Pargs="--deterministic --duration 5s --concurrency 10 --output-dir build/reports/latency-lab/post1 --snapshot-interval 1s"
          ${{ matrix.gradlew }} :latency-lab:runQueueSaturation --no-daemon -Pargs="--deterministic --duration 2s --concurrency 1 --output-dir build/reports/latency-lab/post2 --snapshot-interval 1s"
          ${{ matrix.gradlew }} :latency-lab:runHedgedRequests --no-daemon -Pargs="--deterministic --duration 5s --concurrency 10 --output-dir build/reports/latency-lab/post3 --snapshot-interval 1s --hedge-threshold p95"
          ${{ matrix.gradlew }} :latency-lab:runCoordinatedOmission --no-daemon -Pargs="--deterministic --duration 5s --concurrency 10 --output-dir build/reports/latency-lab/post4 --snapshot-interval 1s --measurement-mode both"
          ${{ matrix.gradlew }} :latency-lab:runBackpressure --no-daemon -Pargs="--deterministic --duration 5s --concurrency 10 --output-dir build/reports/latency-lab/post5 --snapshot-interval 1s --backpressure-strategy all"
          ${{ matrix.gradlew }} :latency-lab:runSloPolicy --no-daemon -Pargs="--deterministic --duration 5s --concurrency 10 --output-dir build/reports/latency-lab/post6 --snapshot-interval 1s --slo-target p99<200ms"
      - name: Upload latency-lab reports
        uses: actions/upload-artifact@v4
        with:
          name: latency-lab-reports-${{ matrix.artifact-suffix }}
          path: build/reports/latency-lab
      - name: Generate backpressure-playground reports
        run: |
          ${{ matrix.gradlew }} :backpressure-playground:runLoadCollapse --no-daemon -Pargs="--deterministic --duration 5s --output-dir build/reports/backpressure-playground/bp-post1"
          ${{ matrix.gradlew }} :backpressure-playground:runAdmissionControl --no-daemon -Pargs="--deterministic --duration 5s --output-dir build/reports/backpressure-playground/bp-post2"
          ${{ matrix.gradlew }} :backpressure-playground:runTokenVsLeaky --no-daemon -Pargs="--deterministic --duration 5s --output-dir build/reports/backpressure-playground/bp-post3"
      - name: Upload backpressure-playground reports
        uses: actions/upload-artifact@v4
        with:
          name: backpressure-playground-reports-${{ matrix.artifact-suffix }}
          path: build/reports/backpressure-playground
