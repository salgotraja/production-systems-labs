# CI — selective builds per lab + golden file diff tests
# Only builds the modules that changed. Full root build runs on main-branch pushes.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Always build lab-commons — all labs depend on it
  lab-commons:
    name: lab-commons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build and test lab-commons
        run: ./gradlew :lab-commons:build --no-daemon

  # Build latency-lab only when its sources or lab-commons change
  latency-lab:
    name: latency-lab
    runs-on: ubuntu-latest
    needs: lab-commons
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'latency-lab/') ||
      contains(github.event.pull_request.changed_files, 'lab-commons/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build and test latency-lab
        run: ./gradlew :latency-lab:build --no-daemon

  # Golden file regression check — runs deterministic experiments and diffs against golden/
  golden-files:
    name: golden-file regression
    runs-on: ubuntu-latest
    needs: latency-lab
    # Only run on main push or when golden files might be affected
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Run Post 1 deterministic experiment
        run: |
          ./gradlew :latency-lab:runPost1 --args="--deterministic --duration 30s --output-dir ./ci-results/post1" --no-daemon
      - name: Diff golden files (1% numeric tolerance)
        run: |
          ./gradlew :lab-commons:goldenDiff --args="./ci-results/post1/results.csv ./golden/post1/results.csv" --no-daemon || true
